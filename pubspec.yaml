name: jxcode
description: "Cross-platform Claude Code CLI client — Android ARM8 & macOS Intel"
version: 2.0.0
publish_to: 'none'

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  go_router: ^14.8.0
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^10.0.0
  flutter_local_notifications: ^18.0.1
  url_launcher: ^6.3.1
  flutter_markdown: ^0.7.6
  shared_preferences: ^2.3.5
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1
  watcher: ^1.1.1
  connectivity_plus: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
